###############################################################################
# Uzavita - CI Pipeline
# Runs on push to main and on all pull requests
###############################################################################
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  POSTGRES_USER: uzavita_test
  POSTGRES_PASSWORD: test_password
  POSTGRES_DB: uzavita_test

permissions:
  contents: read
  security-events: write

jobs:
  # ===========================================================================
  # Lint & Type Check
  # ===========================================================================
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --workspaces --if-present
        continue-on-error: true

      - name: Run TypeScript type check
        run: npm run typecheck --workspaces --if-present
        continue-on-error: true

  # ===========================================================================
  # Backend Tests
  # ===========================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uzavita_test -d uzavita_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run database migrations
        run: npm run migrate --workspace=packages/backend
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Run tests
        run: npm run test --workspace=packages/backend -- --passWithNoTests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-only
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-for-ci-only
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NODE_ENV: test

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: packages/backend/coverage/
          retention-days: 7

  # ===========================================================================
  # Web Frontend Tests
  # ===========================================================================
  test-web:
    name: Web Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run tests with Vitest
        run: npm run test --workspace=packages/web -- --passWithNoTests
        env:
          NODE_ENV: test

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: packages/web/coverage/
          retention-days: 7

  # ===========================================================================
  # ML Service Tests
  # ===========================================================================
  test-ml:
    name: ML Service Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uzavita_test -d uzavita_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/ml-service/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          cd packages/ml-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting (ruff)
        run: |
          cd packages/ml-service
          ruff check . || true
          ruff format --check . || true

      - name: Run type checking (mypy)
        run: |
          cd packages/ml-service
          mypy src/ --ignore-missing-imports || true

      - name: Run tests with pytest
        run: |
          cd packages/ml-service
          pytest tests/ -v || true
        env:
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test

      - name: Upload ML coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ml-coverage
          path: packages/ml-service/coverage/
          retention-days: 7

  # ===========================================================================
  # Build
  # ===========================================================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test-backend, test-web, test-ml]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Build backend Docker image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.backend \
            -t uzavita/backend:ci-${{ github.sha }} \
            .

      - name: Build web Docker image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.web \
            -t uzavita/web:ci-${{ github.sha }} \
            .

      - name: Verify Docker images
        run: |
          docker images | grep uzavita
          echo "Backend image size:"
          docker inspect uzavita/backend:ci-${{ github.sha }} --format='{{.Size}}' | numfmt --to=iec
          echo "Web image size:"
          docker inspect uzavita/web:ci-${{ github.sha }} --format='{{.Size}}' | numfmt --to=iec

  # ===========================================================================
  # Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Run npm audit (JSON output for reporting)
        run: npm audit --json --omit=dev > npm-audit-results.json || true

      - name: Build Docker images for scanning
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.backend \
            -t uzavita/backend:scan \
            .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy filesystem scan
        run: |
          trivy fs \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs-results.sarif \
            . || true

      - name: Trivy container scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-image-results.sarif \
            uzavita/backend:scan || true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

      - name: Upload security scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            npm-audit-results.json
            trivy-fs-results.sarif
            trivy-image-results.sarif
          retention-days: 30
