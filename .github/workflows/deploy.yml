###############################################################################
# Uzavita - CD Pipeline
# Deploys to staging automatically and production with manual approval
###############################################################################
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Docker image tag to deploy (defaults to latest commit SHA)"
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'uzavita' }}

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Build & Push Docker Images
  # ===========================================================================
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/uzavita/backend:${{ steps.set-tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/uzavita/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/uzavita/web:${{ steps.set-tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/uzavita/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          platforms: linux/amd64

      - name: Build & push ML service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/ml-service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/uzavita/ml-service:${{ steps.set-tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/uzavita/ml-service:latest
          cache-from: type=gha,scope=ml-service
          cache-to: type=gha,mode=max,scope=ml-service
          platforms: linux/amd64

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: >
      github.event.inputs.environment != 'production'
    environment:
      name: staging
      url: https://app.staging.uzavita.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }}-staging \
            --region ${{ env.AWS_REGION }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in staging overlay
        run: |
          cd infrastructure/k8s/overlays/staging
          kustomize edit set image \
            uzavita/backend=${{ env.ECR_REGISTRY }}/uzavita/backend:${{ needs.build-images.outputs.image_tag }} \
            uzavita/web=${{ env.ECR_REGISTRY }}/uzavita/web:${{ needs.build-images.outputs.image_tag }} \
            uzavita/ml-service=${{ env.ECR_REGISTRY }}/uzavita/ml-service:${{ needs.build-images.outputs.image_tag }}

      - name: Deploy to staging
        run: |
          kustomize build infrastructure/k8s/overlays/staging | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/staging-backend -n uzavita-staging --timeout=300s
          kubectl rollout status deployment/staging-web -n uzavita-staging --timeout=300s
          kubectl rollout status deployment/staging-ml-service -n uzavita-staging --timeout=300s

      - name: Run smoke tests
        run: |
          # Wait for services to be fully ready
          sleep 30

          # Health check endpoints
          BACKEND_STATUS=$(kubectl exec -n uzavita-staging deploy/staging-backend -- \
            wget -qO- http://localhost:4000/health 2>/dev/null || echo "failed")
          echo "Backend health: ${BACKEND_STATUS}"

          if echo "${BACKEND_STATUS}" | grep -q "failed"; then
            echo "Backend health check failed!"
            exit 1
          fi

      - name: Notify Slack - Staging Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Staging deployment successful :white_check_mark:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Uzavita - Staging Deployed* :white_check_mark:\n*Commit:* `${{ needs.build-images.outputs.image_tag }}`\n*Triggered by:* ${{ github.actor }}\n*URL:* https://app.staging.uzavita.app"
                  }
                }
              ]
            }

      - name: Notify Slack - Staging Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Staging deployment FAILED :x:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Uzavita - Staging Deploy FAILED* :x:\n*Commit:* `${{ needs.build-images.outputs.image_tag }}`\n*Triggered by:* ${{ github.actor }}\n*Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, deploy-staging]
    if: >
      always() &&
      (needs.deploy-staging.result == 'success' || github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://app.uzavita.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }}-production \
            --region ${{ env.AWS_REGION }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in production overlay
        run: |
          cd infrastructure/k8s/overlays/production
          kustomize edit set image \
            uzavita/backend=${{ env.ECR_REGISTRY }}/uzavita/backend:${{ needs.build-images.outputs.image_tag }} \
            uzavita/web=${{ env.ECR_REGISTRY }}/uzavita/web:${{ needs.build-images.outputs.image_tag }} \
            uzavita/ml-service=${{ env.ECR_REGISTRY }}/uzavita/ml-service:${{ needs.build-images.outputs.image_tag }}

      - name: Deploy to production
        run: |
          kustomize build infrastructure/k8s/overlays/production | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/prod-backend -n uzavita-production --timeout=600s
          kubectl rollout status deployment/prod-web -n uzavita-production --timeout=300s
          kubectl rollout status deployment/prod-ml-service -n uzavita-production --timeout=600s

      - name: Run production smoke tests
        run: |
          sleep 30

          # Verify all pods are running
          READY_PODS=$(kubectl get pods -n uzavita-production -l app.kubernetes.io/part-of=uzavita --no-headers | grep Running | wc -l)
          echo "Running pods: ${READY_PODS}"

          # Health checks via internal service endpoints
          kubectl exec -n uzavita-production deploy/prod-backend -- \
            wget -qO- http://localhost:4000/health

      - name: Notify Slack - Production Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "PRODUCTION deployment successful :rocket:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Uzavita - PRODUCTION Deployed* :rocket:\n*Image Tag:* `${{ needs.build-images.outputs.image_tag }}`\n*Triggered by:* ${{ github.actor }}\n*URL:* https://app.uzavita.app"
                  }
                }
              ]
            }

      - name: Notify Slack - Production Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "PRODUCTION deployment FAILED :rotating_light:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Uzavita - PRODUCTION Deploy FAILED* :rotating_light:\n*Image Tag:* `${{ needs.build-images.outputs.image_tag }}`\n*Triggered by:* ${{ github.actor }}\n*Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n*ACTION REQUIRED:* Check rollout status and consider rollback."
                  }
                }
              ]
            }
