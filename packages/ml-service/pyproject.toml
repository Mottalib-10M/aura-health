[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aura-ml-service"
version = "1.0.0"
description = "Aura Health AI/ML Model Serving Service"
readme = "README.md"
license = {text = "PROPRIETARY"}
requires-python = ">=3.11"
authors = [
    {name = "Aura Health Engineering", email = "engineering@aurahealth.dev"},
]
keywords = ["health", "ml", "ai", "triage", "forecasting"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Healthcare Industry",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "litellm>=1.50.0",
    "httpx>=0.27.0",
    "numpy>=1.26.0",
    "pandas>=2.2.0",
    "scikit-learn>=1.5.0",
    "xgboost>=2.1.0",
    "prophet>=1.1.5",
    "torch>=2.4.0",
    "transformers>=4.45.0",
    "vllm>=0.6.0",
    "paddleocr>=2.8.0",
    "Pillow>=10.4.0",
    "python-multipart>=0.0.12",
    "redis>=5.1.0",
    "asyncpg>=0.30.0",
    "kafka-python>=2.0.2",
    "python-jose[cryptography]>=3.3.0",
    "structlog>=24.4.0",
    "prometheus-client>=0.21.0",
    "tenacity>=9.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0",
    "httpx>=0.27.0",
    "ruff>=0.7.0",
    "mypy>=1.12.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "TCH"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
