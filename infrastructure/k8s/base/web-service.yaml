###############################################################################
# Uzavita - Web Frontend Service
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: uzavita
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: uzavita
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
