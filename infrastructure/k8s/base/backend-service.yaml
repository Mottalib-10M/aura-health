###############################################################################
# Aura Health - Backend API Service
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aura-health
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: aura-health
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
