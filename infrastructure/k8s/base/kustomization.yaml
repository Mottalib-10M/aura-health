###############################################################################
# Uzavita - Kustomize Base
###############################################################################
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uzavita

commonLabels:
  app.kubernetes.io/part-of: uzavita
  app.kubernetes.io/managed-by: kustomize

resources:
  # Namespace
  - namespace.yaml

  # Configuration
  - configmap.yaml
  - secrets.yaml

  # Backend API
  - backend-deployment.yaml
  - backend-service.yaml

  # Web Frontend
  - web-deployment.yaml
  - web-service.yaml

  # ML Service
  - ml-deployment.yaml
  - ml-service.yaml

  # Data Stores
  - postgres-statefulset.yaml
  - redis-deployment.yaml
  - kafka-statefulset.yaml

  # Networking
  - ingress.yaml

  # Autoscaling
  - hpa.yaml

images:
  - name: uzavita/backend
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/uzavita/backend
    newTag: latest
  - name: uzavita/web
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/uzavita/web
    newTag: latest
  - name: uzavita/ml-service
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/uzavita/ml-service
    newTag: latest
