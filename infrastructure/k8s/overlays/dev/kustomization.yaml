###############################################################################
# Uzavita - Dev Overlay
# Reduced replicas and resources for development/testing environments
###############################################################################
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uzavita-dev

namePrefix: dev-

commonLabels:
  environment: dev

resources:
  - ../../base

# ---------------------------------------------------------------------------
# Namespace override for dev
# ---------------------------------------------------------------------------
patches:
  # Create dev namespace
  - target:
      kind: Namespace
      name: uzavita
    patch: |
      - op: replace
        path: /metadata/name
        value: uzavita-dev

  # Backend: reduce replicas to 1
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi

  # Web: reduce replicas to 1
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 128Mi

  # ML Service: reduce replicas to 1, remove GPU requirement
  - target:
      kind: Deployment
      name: ml-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: remove
        path: /spec/template/spec/containers/0/resources/requests/nvidia.com~1gpu
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits/nvidia.com~1gpu

  # Redis: reduce replicas to 1
  - target:
      kind: Deployment
      name: redis
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Kafka: reduce to 1 broker
  - target:
      kind: StatefulSet
      name: kafka
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # HPA Backend: min 1, max 3
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # HPA ML Service: min 1, max 2
  - target:
      kind: HorizontalPodAutoscaler
      name: ml-service-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

  # HPA Web: min 1, max 3
  - target:
      kind: HorizontalPodAutoscaler
      name: web-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # Ingress: dev hostnames
  - target:
      kind: Ingress
      name: uzavita-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.dev.uzavita.app
      - op: replace
        path: /spec/rules/1/host
        value: app.dev.uzavita.app
      - op: replace
        path: /spec/rules/2/host
        value: ml.dev.uzavita.app
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - api.dev.uzavita.app
          - app.dev.uzavita.app
          - ml.dev.uzavita.app
      - op: replace
        path: /spec/tls/0/secretName
        value: uzavita-dev-tls-cert

# ConfigMap overrides for dev
configMapGenerator:
  - name: uzavita-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - GRAPHQL_PLAYGROUND=true
      - GRAPHQL_INTROSPECTION=true
      - API_URL=https://api.dev.uzavita.app
      - APP_URL=https://app.dev.uzavita.app
      - CORS_ORIGINS=https://app.dev.uzavita.app,http://localhost:3000
      - RATE_LIMIT_MAX=1000

images:
  - name: uzavita/backend
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/uzavita/backend
    newTag: dev-latest
  - name: uzavita/web
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/uzavita/web
    newTag: dev-latest
  - name: uzavita/ml-service
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/uzavita/ml-service
    newTag: dev-latest
